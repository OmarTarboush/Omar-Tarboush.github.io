<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6FE8"/>
      <stop offset="100%" style="stop-color:#6B8FEF"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="200" height="200" rx="46" ry="46"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="46" ry="46" fill="url(#bg)"/>

  <!-- Glare top-left -->
  <ellipse cx="70" cy="60" rx="55" ry="30" fill="rgba(255,255,255,0.12)" transform="rotate(-20,70,60)"/>

  <!-- Card shadow -->
  <rect x="48" y="82" width="110" height="72" rx="12" fill="rgba(0,0,0,0.18)"/>

  <!-- White card -->
  <rect x="44" y="76" width="112" height="72" rx="12" fill="white"/>

  <!-- Chart line -->
  <polyline points="62,122  82,108  102,114  128,88" fill="none" stroke="#7B61FF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot at end of line -->
  <circle cx="128" cy="88" r="7" fill="#5B8DEF"/>
  <circle cx="128" cy="88" r="4" fill="white"/>

  <!-- Small grey bar below line -->
  <rect x="62" y="132" width="40" height="5" rx="2.5" fill="#E0E0E0"/>
</svg>
